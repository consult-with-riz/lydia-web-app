<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lydia Voice Architecture Comparison</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f4f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }
  h1 {
    font-size: 15px;
    font-weight: 500;
    color: #888;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    padding: 32px;
    max-width: 760px;
    width: 100%;
  }
  svg text { font-family: 'Segoe UI', system-ui, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #1a1a18; }
  .ts { font-size: 12px; font-weight: 400; fill: #6b6b66; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #4A1B0C; }
  .c-coral .ts { fill: #993C1D; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #04342C; }
  .c-teal .ts { fill: #0F6E56; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #26215C; }
  .c-purple .ts { fill: #534AB7; }
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th { fill: #2C2C2A; }
  .c-gray .ts { fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  footer {
    margin-top: 20px;
    font-size: 12px;
    color: #aaa;
  }
</style>
</head>
<body>
<h1>Lydia · ElevenLabs Voice Architecture</h1>
<div class="card">
<svg width="100%" viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- HEADERS -->
  <g class="c-coral">
    <rect x="40" y="20" width="270" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="175" y="38" text-anchor="middle" dominant-baseline="central">Your approach</text>
  </g>
  <g class="c-teal">
    <rect x="370" y="20" width="270" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="505" y="38" text-anchor="middle" dominant-baseline="central">Recommended approach</text>
  </g>

  <!-- YOUR APPROACH -->
  <g class="c-gray">
    <rect x="65" y="90" width="220" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="175" y="108" text-anchor="middle" dominant-baseline="central">Advisor speaks</text>
    <text class="ts" x="175" y="128" text-anchor="middle" dominant-baseline="central">Microphone captures audio</text>
  </g>
  <line x1="175" y1="142" x2="175" y2="172" class="arr" marker-end="url(#arrow)"/>

  <g class="c-coral">
    <rect x="65" y="172" width="220" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="175" y="190" text-anchor="middle" dominant-baseline="central">STT transcription</text>
    <text class="ts" x="175" y="210" text-anchor="middle" dominant-baseline="central">Separate service (e.g. Whisper)</text>
  </g>
  <line x1="175" y1="224" x2="175" y2="254" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="65" y="254" width="220" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="175" y="272" text-anchor="middle" dominant-baseline="central">Lydia (LLM)</text>
    <text class="ts" x="175" y="292" text-anchor="middle" dominant-baseline="central">Claude generates response</text>
  </g>
  <line x1="175" y1="306" x2="175" y2="336" class="arr" marker-end="url(#arrow)"/>

  <g class="c-coral">
    <rect x="65" y="336" width="220" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="175" y="354" text-anchor="middle" dominant-baseline="central">ElevenLabs TTS API</text>
    <text class="ts" x="175" y="374" text-anchor="middle" dominant-baseline="central">Text → voice (separate call)</text>
  </g>
  <line x1="175" y1="388" x2="175" y2="418" class="arr" marker-end="url(#arrow)"/>

  <g class="c-gray">
    <rect x="65" y="418" width="220" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="175" y="436" text-anchor="middle" dominant-baseline="central">Audio returned</text>
    <text class="ts" x="175" y="456" text-anchor="middle" dominant-baseline="central">Advisor hears response</text>
  </g>

  <text class="ts" x="175" y="510" text-anchor="middle" dominant-baseline="central">3 separate services to manage</text>
  <rect x="65" y="520" width="67" height="22" rx="4" fill="none" stroke="#D85A30" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text class="ts" x="99" y="531" text-anchor="middle" dominant-baseline="central">STT seam</text>
  <rect x="141" y="520" width="67" height="22" rx="4" fill="none" stroke="#D85A30" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text class="ts" x="175" y="531" text-anchor="middle" dominant-baseline="central">LLM seam</text>
  <rect x="217" y="520" width="67" height="22" rx="4" fill="none" stroke="#D85A30" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text class="ts" x="251" y="531" text-anchor="middle" dominant-baseline="central">TTS seam</text>

  <!-- RECOMMENDED APPROACH -->
  <g class="c-gray">
    <rect x="395" y="90" width="220" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="505" y="108" text-anchor="middle" dominant-baseline="central">Advisor speaks</text>
    <text class="ts" x="505" y="128" text-anchor="middle" dominant-baseline="central">Microphone captures audio</text>
  </g>
  <line x1="505" y1="142" x2="505" y2="172" class="arr" marker-end="url(#arrow)"/>

  <!-- ElevenLabs platform dashed container -->
  <rect x="375" y="165" width="260" height="310" rx="12" fill="none" stroke="#0F6E56" stroke-width="0.8" stroke-dasharray="5 3"/>
  <text class="ts" x="505" y="183" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">ElevenLabs conversational AI</text>

  <g class="c-teal">
    <rect x="395" y="194" width="220" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="505" y="212" text-anchor="middle" dominant-baseline="central">Scribe v2 (STT)</text>
    <text class="ts" x="505" y="232" text-anchor="middle" dominant-baseline="central">~150ms transcription</text>
  </g>
  <line x1="505" y1="246" x2="505" y2="276" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="395" y="276" width="220" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="505" y="294" text-anchor="middle" dominant-baseline="central">Lydia (LLM)</text>
    <text class="ts" x="505" y="314" text-anchor="middle" dominant-baseline="central">Your LLM, plugged in</text>
  </g>
  <line x1="505" y1="328" x2="505" y2="358" class="arr" marker-end="url(#arrow)"/>

  <g class="c-teal">
    <rect x="395" y="358" width="220" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="505" y="376" text-anchor="middle" dominant-baseline="central">Flash v2.5 (TTS)</text>
    <text class="ts" x="505" y="396" text-anchor="middle" dominant-baseline="central">~75ms voice generation</text>
  </g>
  <line x1="505" y1="440" x2="505" y2="458" class="arr" marker-end="url(#arrow)"/>

  <g class="c-gray">
    <rect x="395" y="458" width="220" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="505" y="476" text-anchor="middle" dominant-baseline="central">Audio returned</text>
    <text class="ts" x="505" y="496" text-anchor="middle" dominant-baseline="central">Advisor hears response</text>
  </g>

  <text class="ts" x="505" y="530" text-anchor="middle" dominant-baseline="central">1 platform, native session mgmt</text>
  <rect x="395" y="540" width="220" height="22" rx="4" fill="none" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ts" x="505" y="551" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Analytics + monitoring included</text>

  <!-- DIVIDER -->
  <line x1="340" y1="20" x2="340" y2="580" stroke="#ccc" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- BOTTOM COMPARISON -->
  <rect x="40" y="590" width="600" height="1" fill="#e0e0e0"/>

  <text class="ts" x="175" y="622" text-anchor="middle" dominant-baseline="central">Total latency: ~700–900ms</text>
  <text class="ts" x="175" y="646" text-anchor="middle" dominant-baseline="central">Error handling: 3 failure points</text>
  <text class="ts" x="175" y="670" text-anchor="middle" dominant-baseline="central">Turn detection: manual</text>

  <text class="ts" x="505" y="622" text-anchor="middle" dominant-baseline="central">Total latency: ~500ms (optimal)</text>
  <text class="ts" x="505" y="646" text-anchor="middle" dominant-baseline="central">Error handling: 1 platform</text>
  <text class="ts" x="505" y="670" text-anchor="middle" dominant-baseline="central">Turn detection: built-in</text>

  <!-- Footer note -->
  <rect x="40" y="695" width="600" height="44" rx="8" fill="none" stroke="#ddd" stroke-width="0.5"/>
  <text class="ts" x="340" y="712" text-anchor="middle" dominant-baseline="central">In both approaches, Lydia's intelligence (prompts, knowledge base, Claude)</text>
  <text class="ts" x="340" y="730" text-anchor="middle" dominant-baseline="central">stays entirely yours. ElevenLabs only handles the voice loop.</text>
</svg>
</div>
<footer>Lydia · Shaping Wealth · Voice Architecture · March 2026</footer>
</body>
</html>
